<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Libertium Smart Matcher</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0f172a;
  --card:#111827;
  --card2:#1f2937;
  --text:#f8fafc;
  --muted:#94a3b8;
  --line:#334155;
  --primary:#2563eb;
  --primary2:#1d4ed8;
  --ok:#10b981;
  --warn:#f59e0b;
  --radius:18px;
}

*{box-sizing:border-box}
body{
  margin:0;
  background:linear-gradient(180deg,#020617,#0f172a);
  color:var(--text);
  font-family:Inter,sans-serif;
}

.container{
  width:min(1180px,92%);
  margin:auto;
  padding:32px 0 60px;
}

.hero{
  background:linear-gradient(135deg,#1e293b,#0f172a);
  border:1px solid var(--line);
  border-radius:28px;
  padding:40px;
  margin-bottom:28px;
  box-shadow:0 20px 50px rgba(0,0,0,.35);
}

.hero h1{
  margin:0 0 10px;
  font-size:42px;
}

.hero p{
  color:var(--muted);
  max-width:800px;
  line-height:1.7;
}

.grid{
  display:grid;
  grid-template-columns:420px 1fr;
  gap:24px;
}

.card{
  background:rgba(17,24,39,.9);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:24px;
  backdrop-filter:blur(8px);
}

h2{
  margin-top:0;
  font-size:22px;
}

.section{
  margin-bottom:24px;
}

.label{
  display:block;
  margin-bottom:8px;
  color:#cbd5e1;
  font-size:14px;
}

select,input{
  width:100%;
  padding:14px;
  background:#0f172a;
  border:1px solid #334155;
  color:white;
  border-radius:12px;
  font-size:15px;
}

button{
  border:none;
  cursor:pointer;
  transition:.2s;
}

.primary{
  width:100%;
  padding:16px;
  border-radius:14px;
  background:linear-gradient(135deg,var(--primary),var(--primary2));
  color:white;
  font-weight:700;
  font-size:15px;
}

.primary:hover{
  transform:translateY(-1px);
}

.vehicle{
  border:1px solid var(--line);
  border-radius:18px;
  padding:18px;
  margin-bottom:18px;
  background:#0b1220;
}

.vehicle-top{
  display:flex;
  justify-content:space-between;
  gap:18px;
  align-items:flex-start;
}

.score{
  background:#0b3a22;
  color:#6ee7b7;
  border:1px solid #14532d;
  padding:8px 12px;
  border-radius:999px;
  font-size:13px;
  font-weight:700;
  white-space:nowrap;
}

.vehicle h3{
  margin:0 0 6px;
}

.price{
  font-size:28px;
  font-weight:800;
  margin:12px 0;
}

.tags{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:12px;
}

.tag{
  border:1px solid #334155;
  color:#cbd5e1;
  border-radius:999px;
  padding:6px 10px;
  font-size:12px;
}

.pitch{
  margin-top:16px;
  padding:16px;
  border-radius:14px;
  background:#111827;
  border:1px solid #1e3a8a;
  color:#dbeafe;
  line-height:1.7;
}

.config{
  margin-top:18px;
  background:#0b1220;
  border:1px dashed #334155;
  padding:14px;
  border-radius:12px;
  color:#94a3b8;
  font-size:13px;
  line-height:1.7;
}

.code{
  background:black;
  padding:10px;
  border-radius:8px;
  overflow:auto;
  margin-top:10px;
  font-family:monospace;
  color:#93c5fd;
}

.badge{
  display:inline-flex;
  align-items:center;
  gap:8px;
  background:#0f172a;
  border:1px solid #334155;
  border-radius:999px;
  padding:8px 12px;
  margin-bottom:16px;
  color:#cbd5e1;
  font-size:13px;
}

.notice{
  background:#3b2f07;
  color:#fde68a;
  border:1px solid #92400e;
  padding:14px;
  border-radius:14px;
  margin-bottom:20px;
  line-height:1.6;
}

a{
  color:#93c5fd;
}

@media(max-width:980px){
  .grid{
    grid-template-columns:1fr;
  }
}
</style>
</head>
<body>

<div class="container">

  <div class="hero">
    <h1>Libertium Smart Matcher</h1>

  </div>

  <div class="grid">

    <div class="card">

      <h2>Profil client</h2>

      <div class="section">
        <label class="label">Voyageurs</label>
        <select id="voyageurs">
          <option value="couple">Couple</option>
          <option value="famille">Famille</option>
          <option value="solo">Solo</option>
          <option value="seniors">Seniors</option>
        </select>
      </div>

      <div class="section">
        <label class="label">Budget max</label>
        <input id="budget" type="number" value="70000"/>
      </div>

      <div class="section">
        <label class="label">Style de conduite</label>
        <select id="conduite">
          <option value="compact">Compact</option>
          <option value="equilibre">Équilibré</option>
          <option value="grand">Grand confort</option>
        </select>
      </div>

      <div class="section">
        <label class="label">Priorité</label>
        <select id="priority">
          <option value="autonomie">Autonomie</option>
          <option value="famille">Famille</option>
          <option value="premium">Premium</option>
          <option value="budget">Budget</option>
        </select>
      </div>

      <button class="primary" onclick="runMatcher()">
        Lancer le matching intelligent
      </button>

      <div class="config">

        <div class="code">
const API_ENDPOINT =
"https://TON-WORKER.workers.dev/search";
        </div>

      </div>

    </div>

    <div class="card">

      <div class="notice">

      </div>

      <h2>Recommandations</h2>

      <div id="results"></div>

    </div>

  </div>

</div>

<script>

/* =========================================================
   CONFIG
========================================================= */

const API_ENDPOINT = null;

/*
Mettre ici :
https://xxx.workers.dev/search

Le proxy doit retourner :

[
 {
   title,
   brand,
   price,
   type,
   url,
   tags:[]
 }
]
*/

/* =========================================================
   STOCK DEMO
========================================================= */

const DEMO_STOCK = [

{
 title:"Adria Twin Supreme 640",
 brand:"Adria",
 price:72900,
 type:"Van",
 url:"https://www.libertium.fr/",
 tags:["compact","premium","autonomie","couple"]
},

{
 title:"Chausson 640 Titanium",
 brand:"Chausson",
 price:68900,
 type:"Profilé",
 url:"https://www.libertium.fr/",
 tags:["equilibre","famille","garage"]
},

{
 title:"Rimor Kilig 9",
 brand:"Rimor",
 price:57900,
 type:"Capucine",
 url:"https://www.libertium.fr/",
 tags:["famille","budget","6 couchages"]
},

{
 title:"Carthago C-Tourer",
 brand:"Carthago",
 price:119000,
 type:"Intégral",
 url:"https://www.libertium.fr/",
 tags:["premium","grand","autonomie"]
}

];

/* =========================================================
   MATCHING ENGINE
========================================================= */

function scoreVehicle(v, profile){

  let score = 0;

  if(v.price <= profile.budget) score += 30;
  else score -= 20;

  if(v.tags.includes(profile.priority)) score += 40;

  if(v.tags.includes(profile.conduite)) score += 20;

  if(profile.voyageurs === "famille" && v.tags.includes("famille"))
    score += 25;

  if(profile.voyageurs === "couple" && v.tags.includes("couple"))
    score += 25;

  return score;
}

/* =========================================================
   ARGUMENTAIRE AUTO
========================================================= */

function buildPitch(v, profile){

  let txt = "";

  if(profile.voyageurs === "famille"){
    txt += `
Ce modèle est particulièrement adapté aux voyages familiaux grâce
à son espace de vie généreux et sa modularité.
`;
  }

  if(profile.priority === "autonomie"){
    txt += `
Son niveau d’autonomie permet plusieurs jours hors camping,
ce qui correspond parfaitement au besoin exprimé.
`;
  }

  if(profile.priority === "premium"){
    txt += `
La finition premium et le confort de conduite créent une forte
valeur perçue en concession.
`;
  }

  txt += `
Le rapport équipement / prix est cohérent avec votre enveloppe
budgétaire et votre fréquence d’utilisation.
`;

  return txt.trim();
}

/* =========================================================
   FETCH LIVE
========================================================= */

async function fetchVehicles(){

  if(!API_ENDPOINT){
    return DEMO_STOCK;
  }

  try{
    const r = await fetch(API_ENDPOINT);
    return await r.json();
  }catch(e){
    console.error(e);
    return DEMO_STOCK;
  }
}

/* =========================================================
   MAIN
========================================================= */

async function runMatcher(){

  const profile = {
    voyageurs:document.getElementById("voyageurs").value,
    budget:Number(document.getElementById("budget").value),
    conduite:document.getElementById("conduite").value,
    priority:document.getElementById("priority").value
  };

  const vehicles = await fetchVehicles();

  const ranked = vehicles
    .map(v => ({
      ...v,
      score:scoreVehicle(v, profile),
      pitch:buildPitch(v, profile)
    }))
    .sort((a,b)=>b.score-a.score);

  render(ranked);
}

/* =========================================================
   RENDER
========================================================= */

function render(list){

  const el = document.getElementById("results");

  if(!list.length){
    el.innerHTML = "Aucun résultat";
    return;
  }

  el.innerHTML = list.map(v => `
    <div class="vehicle">

      <div class="vehicle-top">

        <div>
          <h3>${v.title}</h3>
          <div>${v.brand} • ${v.type}</div>
        </div>

        <div class="score">
          Match ${v.score}%
        </div>

      </div>

      <div class="price">
        ${v.price.toLocaleString("fr-FR")} €
      </div>

      <div class="tags">
        ${v.tags.map(t=>`<div class="tag">${t}</div>`).join("")}
      </div>

      <div class="pitch">
        ${v.pitch}
      </div>

      <div style="margin-top:16px;">
        <a href="${v.url}" target="_blank">
          Voir l’annonce →
        </a>
      </div>

    </div>
  `).join("");
}

runMatcher();

</script>

</body>
</html>
