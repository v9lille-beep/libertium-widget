<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Libertium — Guide découverte client</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0f1f3d;
  --blue: #1a3a6b;
  --blue-mid: #2e5fa3;
  --blue-lt: #e8f0fb;
  --blue-border: #b5d4f4;
  --gold: #c8960c;
  --text: #1a1a2e;
  --text-sec: #5a6480;
  --text-hint: #9ba3b8;
  --bg: #f8f9fc;
  --bg-card: #ffffff;
  --border: #e2e6f0;
  --border-mid: #c8cedf;
  --radius: 12px;
  --radius-sm: 8px;
  --radius-pill: 24px;
  --shadow: 0 2px 12px rgba(15,31,61,.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; }

/* Header & Container */
.header { background: var(--navy); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 60px; }
.logo { font-family: 'DM Serif Display', serif; font-size: 20px; color: #fff; display: flex; align-items: center; gap: 10px; }
.logo-badge { background: var(--gold); color: #fff; font-size: 10px; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; }
.container { max-width: 780px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

/* Card & UI */
.card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
.step { display: none; }
.step.active { display: block; }
.progress-wrap { padding: 1.25rem 1.75rem .5rem; }
.progress-bar { display: flex; gap: 5px; margin-bottom: .75rem; }
.progress-step { flex: 1; height: 3px; border-radius: 2px; background: var(--border); }
.progress-step.active { background: var(--blue-mid); }

/* Elements */
.step-header { padding: 1.25rem 1.75rem 0; display: flex; align-items: flex-start; gap: 14px; }
.step-num { width: 36px; height: 36px; border-radius: 50%; background: var(--blue-lt); color: var(--blue-mid); display: flex; align-items: center; justify-content: center; font-weight: 600; }
.step-title { font-size: 17px; font-weight: 600; color: var(--navy); }
.step-sub { font-size: 13px; color: var(--text-sec); margin-top: 2px; }
.step-body { padding: 1.25rem 1.75rem; }
.q-block { margin-bottom: 1.25rem; }
.q-label { font-size: 11px; font-weight: 600; color: var(--text-sec); text-transform: uppercase; margin-bottom: 10px; }
.chips { display: flex; flex-wrap: wrap; gap: 8px; }
.chip { padding: 8px 16px; border-radius: var(--radius-pill); border: 1px solid var(--border-mid); font-size: 13px; cursor: pointer; }
.chip.sel { background: var(--blue-lt); border-color: var(--blue-mid); color: var(--blue); }

/* Navigation */
.step-nav { display: flex; justify-content: space-between; padding: 1rem 1.75rem 1.5rem; border-top: 1px solid var(--border); }
.btn { padding: 10px 22px; border-radius: var(--radius-sm); border: 1px solid var(--border-mid); background: var(--bg-card); cursor: pointer; font-size: 13px; }
.btn.primary { background: var(--blue-mid); color: #fff; border: none; }

/* Results */
.score-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 1.25rem; }
.score-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; }
.sc-label { font-size: 11px; color: var(--text-hint); }
.sc-val { font-size: 15px; font-weight: 600; color: var(--navy); }
.reco-card { border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; transition: .2s; }
.reco-card:hover { border-color: var(--blue-mid); }
.reco-name { font-size: 15px; font-weight: 600; color: var(--navy); margin-bottom: 4px; }
.reco-why { font-size: 13px; color: var(--text-sec); }
</style>
</head>
<body>

<div class="header">
  <div class="logo">Libertium <span class="logo-badge">Guide client</span></div>
</div>

<div class="container">
  <div class="card">
    <div class="progress-wrap"><div class="progress-bar" id="prog"></div></div>

    <div class="step active" id="s1">
      <div class="step-header"><div class="step-num">1</div><div><div class="step-title">Qui voyage ?</div></div></div>
      <div class="step-body">
        <div class="q-block">
          <div class="q-label">Vous partez...</div>
          <div class="chips" data-k="voyageurs">
            <div class="chip" data-v="couple">En couple</div>
            <div class="chip" data-v="famille">En famille</div>
          </div>
        </div>
      </div>
      <div class="step-nav"><div></div><button class="btn primary" onclick="showResults()">Voir résultats →</button></div>
    </div>

    <div class="step" id="s5">
      <div class="step-header"><div class="step-num">✓</div><div><div class="step-title">Recommandation</div></div></div>
      <div class="step-body">
        <div class="score-grid" id="scores"></div>
        <div id="recos"></div>
        <a id="stock-link" href="#" target="_blank" class="btn primary" style="display:block; text-align:center; margin-top:20px;">Voir le stock sur Libertium.fr</a>
      </div>
      <div class="step-nav"><button class="btn" onclick="location.reload()">↺ Réinitialiser</button></div>
    </div>
  </div>
</div>

<script>
const D = {};
document.querySelectorAll('.chip').forEach(c => {
  c.addEventListener('click', () => {
    c.parentElement.querySelectorAll('.chip').forEach(x => x.classList.remove('sel'));
    c.classList.add('sel');
    D[c.parentElement.dataset.k] = c.dataset.v;
  });
});

function showResults() {
  document.getElementById('s1').classList.remove('active');
  document.getElementById('s5').classList.add('active');
  document.getElementById('scores').innerHTML = `<div class="score-card"><div class="sc-label">Profil</div><div class="sc-val">${D.voyageurs || 'Non défini'}</div></div>`;
  
  // Exemple de recommandation
  const recos = [{type:'Profilé', slug:'camping-car/profile', why:'Le compromis idéal pour votre profil.'}];
  document.getElementById('recos').innerHTML = recos.map(r => `
    <a href="https://www.libertium.fr/vehicule/${r.slug}" target="_blank" style="text-decoration:none;">
      <div class="reco-card"><div class="reco-name">${r.type}</div><div class="reco-why">${r.why}</div></div>
    </a>
  `).join('');
  document.getElementById('stock-link').href = `https://www.libertium.fr/vehicule/${recos[0].slug}`;
}
</script>
</body>
</html>
